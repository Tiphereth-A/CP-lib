name: Build & Relase

on:
  push:
    branches:
      - master
    paths:
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/**'
      - 'libs/**'
      - 'src/**'
      - '*.bib'
      - '*.cls'
      - '*.py'
      - '*.tex'
  pull_request:
    branches:
      - master
    paths:
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/**'
      - 'libs/**'
      - 'src/**'
      - '*.bib'
      - '*.cls'
      - '*.py'
      - '*.tex'
  workflow_dispatch:
    inputs:
      ignore_font_cache:
        type: boolean
        default: false

jobs:
  build-tex:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - name: Install Python dependencies
        run: uv sync --frozen
      - name: Generate TeX files
        run: |
          uv run python manager.py -l DEBUG doc -t tex
      - name: Restore fonts cache
        if: ${{ !inputs.ignore_font_cache }}
        id: cache-fonts
        uses: actions/cache/restore@v5
        with:
          path: .cp-lib/fonts
          key: fonts-${{ hashFiles('Makefile') }}
      - name: Download fonts
        if: ${{ steps.cache-fonts.outputs.cache-hit != 'true' }}
        run: |
            echo "::group::Downloading fonts"
            make download-fonts
            echo "::endgroup::"
            echo "::group::Downloaded fonts list"
            ls -l .cp-lib/fonts
            echo "::endgroup::"
      - name: Save fonts cache
        if: ${{ steps.cache-fonts.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v5
        with:
          path: .cp-lib/fonts
          key: fonts-${{ hashFiles('Makefile') }}
      - name: Build the LaTeX document
        id: build-latex
        uses: xu-cheng/latex-action@v4
        with:
          latexmk_use_xelatex: true
          latexmk_shell_escape: true
          args: "-pdf -file-line-error -halt-on-error -interaction=nonstopmode -8bit"
          extra_system_packages: |
            unzip
            wget
            python3
            py3-pip
            py3-pygments
            inkscape
            font-noto
            font-noto-cjk
          pre_compile: |
            cp -r .cp-lib/fonts/* /usr/share/fonts
            fc-cache -f
          root_file: notebook.tex
      - name: Upload PDF to artifacts
        uses: actions/upload-artifact@v7
        with:
          name: notebook
          path: notebook.pdf

  pack-include:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - name: Install Python dependencies
        run: uv sync --frozen
      - name: Copying C++ header files
        run: uv run python manager.py -l DEBUG pack
      - name: Upload LaTeX logs to artifacts
        uses: actions/upload-artifact@v7
        with:
          name: cpp-header
          path: .cp-lib/include

  release-all:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-tex, pack-include]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" artifacts/*
