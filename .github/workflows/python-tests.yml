name: Python Tests

on:
  push:
    branches:
      - master
    paths:
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/**'
      - 'libs/**'
      - 'tests/cplib/**'
      - '*.py'
  pull_request:
    branches:
      - master
    paths:
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/**'
      - 'libs/**'
      - 'tests/cplib/**'
      - '*.py'
  workflow_dispatch:

concurrency:
  group: ${{ github.head_ref || 'x' }}-${{ github.workflow }}-${{ github.ref }}-python-tests
  cancel-in-progress: true

jobs:
  test:
    name: Python Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          version: "latest"
      - name: Install Python dependencies
        run: uv sync --frozen --group dev

      - name: Run all tests
        run: uv run python -m pytest test/cplib/ --cov=libs --cov-report=term-missing -vv
